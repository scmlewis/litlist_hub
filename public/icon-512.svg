  <rect x="196" y="240" width="102" height="8" rx="4" fill="#c9a66b" opacity="0.6"/>
  <rect x="196" y="266" width="130" height="8" rx="4" fill="#c9a66b" opacity="0.6"/>
  <rect x="196" y="292" width="86" height="8" rx="4" fill="#c9a66b" opacity="0.6"/>
  <rect x="196" y="318" width="140" height="8" rx="4" fill="#c9a66b" opacity="0.6"/>
  <rect x="196" y="344" width="108" height="8" rx="4" fill="#c9a66b" opacity="0.6"/>

